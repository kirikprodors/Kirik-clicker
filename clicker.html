<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kirik Gem Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --brawl-blue: linear-gradient(180deg, #4ba3e3 0%, #2a6db0 100%);
            --brawl-green: linear-gradient(180deg, #57d53b 0%, #308a1c 100%);
            --brawl-yellow: linear-gradient(180deg, #f3c623 0%, #b8860b 100%);
            --brawl-red: linear-gradient(180deg, #f54e4e 0%, #a31a1a 100%);
            --brawl-purple: linear-gradient(180deg, #a55eea 0%, #6c3483 100%);
            --dark-bg: #0d1a26;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial Black', 'Rubik', sans-serif;
            background: radial-gradient(circle, #1b3a57 0%, #0d1a26 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .game-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100%;
            position: relative;
        }

        /* Шапка */
        header {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        #username {
            font-size: 18px;
            color: #4ba3e3;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .balance-box {
            font-size: 42px;
            color: #f3c623;
            text-shadow: 2px 4px 0px #634a00;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .balance-box img { width: 35px; }

        /* Зона клика */
        .click-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #gem-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.05s;
        }

        #gem-btn:active { transform: scale(0.9); }

        #gem-img {
            width: 220px;
            filter: drop-shadow(0 0 20px rgba(0, 255, 127, 0.5));
        }

        /* Футер с кнопками */
        footer {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-bottom: 5px solid rgba(0,0,0,0.3);
            text-shadow: 1px 2px 2px rgba(0,0,0,0.5);
        }

        .shop-btn { background: var(--brawl-blue); }
        .rebirth-nav-btn { background: var(--brawl-purple); }

        /* Окна (Модалки) */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 15, 30, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 25px;
            border-radius: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title { font-size: 24px; color: #f3c623; }

        .close-btn {
            background: var(--brawl-red);
            border: none;
            width: 40px; height: 40px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        /* Списки в магазине */
        .shop-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #4ba3e3;
        }

        .upgrade-info h3 { font-size: 16px; margin-bottom: 5px; color: #fff; }
        .upgrade-info p { font-size: 12px; color: #a0b6c6; }

        .buy-btn {
            background: var(--brawl-green);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            border-bottom: 3px solid #145523;
        }

        .buy-btn:disabled {
            background: #444; border-bottom: 3px solid #222; opacity: 0.5;
        }

        /* Секция перерождений */
        .rebirth-stats {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .rebirth-stats b { color: #f3c623; }

        .boost-preview {
            background: rgba(165, 94, 234, 0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px dashed #a55eea;
            color: #d1b2ff;
            text-align: center;
        }

        /* Анимация клика */
        .floating-text {
            position: absolute;
            color: #f3c623;
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: floatMove 0.7s ease-out forwards;
            text-shadow: 2px 2px 0px #000;
        }

        @keyframes floatMove {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <div id="username">ЗАГРУЗКА...</div>
            <div class="balance-box">
                <img src="https://raw.githubusercontent.com/Kirikprodors/Kirik-clicker/main/gem.png" onerror="this.src='https://img.icons8.com/color/96/gem.png'">
                <span id="balance">0</span>
            </div>
        </header>

        <div class="click-area">
            <button id="gem-btn">
                <img id="gem-img" src="https://img.icons8.com/color/240/gem.png">
            </button>
        </div>

        <footer>
            <button class="nav-btn shop-btn" onclick="openModal('shop-modal')">Магазин</button>
            <button class="nav-btn rebirth-nav-btn" onclick="openModal('rebirth-modal')">Перерождения</button>
        </footer>

        <div id="shop-modal" class="modal">
            <div class="modal-header">
                <h2 class="modal-title">МАГАЗИН</h2>
                <button class="close-btn" onclick="closeModal('shop-modal')">X</button>
            </div>
            <div class="shop-list">
                <div class="upgrade-card">
                    <div class="upgrade-info">
                        <h3>Мортис</h3>
                        <p>Урон пули +1</p>
                    </div>
                    <button id="buy-mortis" class="buy-btn" onclick="buyUpgrade('mortis')">10</button>
                </div>
                <div class="upgrade-card" style="border-left-color: #f54e4e;">
                    <div class="upgrade-info">
                        <h3>Шелли</h3>
                        <p>Доп. пуля за клик</p>
                    </div>
                    <button id="buy-shelly" class="buy-btn" onclick="buyUpgrade('shelly')">50</button>
                </div>
            </div>
        </div>

        <div id="rebirth-modal" class="modal">
            <div class="modal-header">
                <h2 class="modal-title">ПЕРЕРОЖДЕНИЕ</h2>
                <button class="close-btn" onclick="closeModal('rebirth-modal')">X</button>
            </div>
            <div class="rebirth-stats">
                <p>Твои Р1: <b id="stat-r1">0</b></p>
                <p>Твои Р2: <b id="stat-r2">0</b></p>
                <p>Множитель Р1: <b id="stat-m1">x1.00</b></p>
                <p>Множитель Р2: <b id="stat-m2">x1.0</b></p>
                
                <div class="boost-preview" id="boost-text">
                    Набери 250 монет для буста!
                </div>
            </div>
            
            <div class="shop-list">
                <div class="upgrade-card" style="border-left-color: #a55eea;">
                    <div class="upgrade-info">
                        <h3>Обычное Р1</h3>
                        <p>Сброс за множитель</p>
                    </div>
                    <button id="btn-rebirth1" class="buy-btn" onclick="doRebirth(1)">250</button>
                </div>
                <div class="upgrade-card" style="border-left-color: #dc3545;">
                    <div class="upgrade-info">
                        <h3>Супер Р2</h3>
                        <p>Цена: 5 Р1</p>
                    </div>
                    <button id="btn-rebirth2" class="buy-btn" onclick="doRebirth(2)">5 Р1</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let coins = 0;
        let mortis = 0;
        let shelly = 0;
        let r1 = 0;
        let r2 = 0;

        function openModal(id) { document.getElementById(id).style.display = 'flex'; updateUI(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Расчеты
        const getCost = (base, lvl) => base * Math.pow(2, lvl);
        const getR1Cost = () => 250 * Math.pow(2, r1);

        function getR1Multiplier() {
            if (r1 === 0) return 1;
            let step = 0.005;
            if (r2 > 0) step += (r2 * 0.1) * 0.005; 
            
            let extra = Math.max(0, coins - getR1Cost());
            return 1 + (r1 * 0.5) + (extra * step);
        }

        function getR2Multiplier() { return 1 + (r2 * 0.1); }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(coins);
            
            // Магазин
            const mCost = getCost(10, mortis);
            const sCost = getCost(50, shelly);
            document.getElementById('buy-mortis').innerText = mCost;
            document.getElementById('buy-mortis').disabled = coins < mCost;
            document.getElementById('buy-shelly').innerText = sCost;
            document.getElementById('buy-shelly').disabled = coins < sCost;

            // Перерождения
            const r1Cost = getR1Cost();
            document.getElementById('stat-r1').innerText = r1;
            document.getElementById('stat-r2').innerText = r2;
            document.getElementById('stat-m1').innerText = "x" + getR1Multiplier().toFixed(2);
            document.getElementById('stat-m2').innerText = "x" + getR2Multiplier().toFixed(1);
            
            document.getElementById('btn-rebirth1').innerText = r1Cost;
            document.getElementById('btn-rebirth1').disabled = coins < r1Cost;
            document.getElementById('btn-rebirth2').disabled = r1 < 5;

            // Текст буста
            const boostVal = (Math.max(0, coins - r1Cost) * (0.005 + (r2 * 0.1 * 0.005))).toFixed(3);
            document.getElementById('boost-text').innerHTML = `При Р1 ты получишь <br><b>+${boostVal}</b> к мультиплееру!`;
            
            if (tg.initDataUnsafe?.user) {
                document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
            } else {
                document.getElementById('username').innerText = "ИГРОК";
            }
        }

        // Клик
        document.getElementById('gem-btn').onclick = (e) => {
            let val = (1 + mortis) * (1 + shelly) * getR1Multiplier() * getR2Multiplier();
            coins += val;
            
            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.innerText = "+" + Math.floor(val);
            txt.style.left = e.clientX + "px";
            txt.style.top = e.clientY + "px";
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 700);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        };

        function buyUpgrade(type) {
            if (type === 'mortis') {
                let c = getCost(10, mortis);
                if (coins >= c) { coins -= c; mortis++; }
            } else {
                let c = getCost(50, shelly);
                if (coins >= c) { coins -= c; shelly++; }
            }
            updateUI();
        }

        function doRebirth(type) {
            if (type === 1) {
                let c = getR1Cost();
                if (coins >= c) {
                    r1++; coins = 0; mortis = 0; shelly = 0;
                    closeModal('rebirth-modal');
                }
            } else {
                if (r1 >= 5) {
                    r2++; r1 -= 5; coins = 0; mortis = 0; shelly = 0;
                    closeModal('rebirth-modal');
                }
            }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
